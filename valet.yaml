name: crm-agent
display_name: CRM Agent
description: >-
  A simple CRM agent backed by Airtable. Bootstraps a Contacts table
  automatically and processes natural language to create, find, and
  update contacts. Designed as a template to extend with channels
  like SMS, email, or Slack.
category: utilities
author: Valet

story:
  hero: "A CRM that lives in your Airtable — talk to it like a teammate."
  subheadline: "Describe a contact in plain English. The agent finds or creates the record in Airtable and shows you exactly what changed."
  steps:
    - role: trigger
      title: "You describe a contact."
      body: "'Add Jane Doe, jane@acme.com, VP Eng' — or 'log a call with Jane about pricing'. Free-form is fine."
    - role: action
      title: "Agent matches or creates."
      body: "Searches Contacts by email, phone, or name. Updates if it finds a match, creates the record if it doesn't."
      catalog: airtable-mcp
    - role: outcome
      title: "Record in, confirmed back."
      body: "Writes the change to Airtable and replies with the full before/after so you can verify — no silent updates."
      catalog: airtable-mcp

connectors:
  - catalog: airtable-mcp
    description: >-
      Provides read/write access to Airtable bases, tables, and records
      for all CRM data operations.
    slot_descriptions:
      AIRTABLE_PERSONAL_ACCESS_TOKEN: >-
        Personal access token with data.records:read, data.records:write,
        schema.bases:read, and schema.bases:write scopes
    ui:
      headline: "Hook up the Airtable that holds your CRM."
      blurb: "The agent bootstraps a Contacts table in your 'Agent-CRM' base on first run. One token, scoped to the bases you pick."
      done_note: "Connected to your Airtable workspace"
